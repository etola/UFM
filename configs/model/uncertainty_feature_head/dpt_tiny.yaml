dpt_feature:
  patch_size: ${model.encoder.patch_size}
  hooks: [0, 1, 2, 3]
  input_feature_dims:
    - ${model.encoder.encoder_embed}
    - ${model.decoder.transformer_dim}
    - ${model.decoder.transformer_dim}
    - ${model.decoder.transformer_dim}
  layer_dims: [32, 64, 128, 256]
  feature_dim: 128
  use_bn: False
  output_width_ratio: 1
  pretrained_checkpoint_path: null

dpt_processor:
  input_feature_dim: 128
  output_dim: ${model.uncertainty_adaptor_map.uncertainty_head_channels}
  hidden_dims: [32, 32]
  pretrained_checkpoint_path: null
